services:
  # --- BACKEND ---
  - type: web
    name: taller-pro-api
    env: python
    region: ohio # O la más cercana a ti
    # Build: Instala y corre migraciones automáticamente
    buildCommand: cd backend && pip install -r requirements.txt && python -m alembic upgrade head
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taller-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generará uno seguro por ti
      - key: ALGORITHM
        value: "HS256"

  # --- FRONTEND ---
  - type: web
    name: taller-pro-client
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist/taller-pro/browser # Ajusta según tu angular.json
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: taller-pro-db
    plan: free # Plan gratuito de PostgreSQL en Render