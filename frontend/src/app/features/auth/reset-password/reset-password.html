<div class="reset-container">
  <h2>Crea tu nueva contraseña</h2>
  <p>Por favor, ingresa tu nueva contraseña y confírmala para acceder a tu cuenta.</p>

  <div class="success-msg" *ngIf="mensaje">
    {{ mensaje }}
  </div>

  <div class="error-msg" *ngIf="error">
    {{ error }}
  </div>

  <form (ngSubmit)="cambiarPassword()" #resetForm="ngForm">
    
    <div class="form-group">
      <label>Nueva Contraseña:</label>
      <input 
        type="password" 
        name="nuevaClave" 
        [(ngModel)]="nuevaClave" 
        required 
        minlength="6"
        placeholder="Mínimo 6 caracteres"
        #passInput="ngModel"
      >
      <div *ngIf="passInput.touched && passInput.invalid" class="validation-error">
        La contraseña debe tener al menos 6 caracteres.
      </div>
    </div>

    <div class="form-group">
      <label>Confirmar Contraseña:</label>
      <input 
        type="password" 
        name="confirmarClave" 
        [(ngModel)]="confirmarClave" 
        required
        placeholder="Repite tu contraseña"
        #confirmInput="ngModel"
      >
      <div *ngIf="confirmInput.touched && nuevaClave !== confirmarClave" class="validation-error">
        Las contraseñas no coinciden.
      </div>
    </div>

    <button 
      type="submit" 
      [disabled]="resetForm.invalid || cargando || nuevaClave !== confirmarClave"
    >
      {{ cargando ? 'Guardando...' : 'Actualizar Contraseña' }}
    </button>

    <a routerLink="/login" class="back-link">
      ← Volver al inicio de sesión
    </a>

  </form>
</div>
