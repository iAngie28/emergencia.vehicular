<div class="forgot-container">
  <h2>¿Olvidaste tu contraseña?</h2>
  <p>No te preocupes. Ingresa tu correo y te enviaremos las instrucciones para restablecerla.</p>
  
  <div class="success-msg" *ngIf="mensaje">
    {{ mensaje }}
  </div>
  
  <div class="error-msg" *ngIf="error">
    {{ error }}
  </div>

  <form (ngSubmit)="enviar()" #forgotForm="ngForm">
    
    <div class="form-group">
      <label>Correo Electrónico:</label>
      <input 
        type="email" 
        name="correo" 
        [(ngModel)]="correo" 
        required 
        email 
        placeholder="ejemplo@taller.com"
        #correoInput="ngModel"
      >
      
      <div *ngIf="correoInput.touched && correoInput.invalid" class="validation-error">
        Por favor ingresa un correo válido.
      </div>
    </div>

    <button type="submit" [disabled]="forgotForm.invalid || cargando">
      {{ cargando ? 'Enviando...' : 'Enviar instrucciones' }}
    </button>
    
    <a routerLink="/login" class="back-link">
      ← Volver al inicio de sesión
    </a>
    
  </form>
</div>
