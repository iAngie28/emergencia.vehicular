<div class="landing-wrapper">
  <div class="hero-section">
    <h1>🚀 Bienvenido a <span class="brand">Taller Pro</span></h1>
    <p>La plataforma líder para la gestión de talleres y auxilios mecánicos.</p>
  </div>

  <div class="options-container">
    <div class="option-card" (click)="irALogin()">
      <div class="icon">🔑</div>
      <h3>Ya soy parte</h3>
      <p>Entra a tu panel de control para gestionar tu taller.</p>
      <button class="btn-secondary">Iniciar Sesión</button>
    </div>

    <div class="option-card featured" (click)="irARegistro()">
      <div class="icon">🛠️</div>
      <h3>Quiero registrar mi Taller</h3>
      <p>Únete a nuestra red y empieza a recibir solicitudes de auxilio hoy mismo.</p>
      <button class="btn-primary">Empezar Onboarding 🚀</button>
    </div>
  </div>
</div>
