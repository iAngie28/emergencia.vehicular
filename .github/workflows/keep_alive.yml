name: Taller Pro Revividor
on:
  schedule:
    - cron: '*/5 * * * *' # Se ejecuta cada 5 minutos
  workflow_dispatch:      # Permite ejecutarlo manualmente desde GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Despertar Servicios
        run: |
          # Reemplaza con tus URLs reales de Render una vez las tengas
          curl -I https://taller-pro-api.onrender.com/api/v1/health
          curl -I https://taller-pro-client.onrender.com